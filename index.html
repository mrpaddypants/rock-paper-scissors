<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Welcome to Rock-Paper-Scissors!</h1>
    <div class="rulebox">Whoever gets to 3 first, wins the game!</div>
    <div id="container-game">
      <button class="rock"><img src="icons/rock.png" alt="Rock" /></button>
      <button class="paper"><img src="icons/paper.png" alt="Paper" /></button>
      <button class="scissors">
        <img src="icons/scissors.png" alt="Scissors" />
      </button>
    </div>
    <div id="container-results"></div>
  </body>
</html>
